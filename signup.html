<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Your Journey | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">Global Hub</a>
            <div style="display: flex; align-items: center; gap: 24px;">
                <a href="signin.html" class="btn btn-outline" style="border: none; font-weight: 600;">Sign In</a>
                <button onclick="toggleSidebar()" style="background: none; border: none; cursor: pointer; padding: 8px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </nav>
    </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="logo" style="font-size: 1.25rem;">Main Menu</span>
        <button onclick="toggleSidebar()" style="background: none; border: none; cursor: pointer;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <ul class="sidebar-menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Global Hub</a></li>
        <li><a href="jobs-ca.html">Canada Careers</a></li>
        <li><a href="jobs-us.html">USA Careers</a></li>
        <li><a href="faq.html">FAQ Center</a></li>
        <li><a href="contact.html">Contact Support</a></li>
    </ul>
</div>

<main class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header" style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--secondary);">Start Your Journey</h1>
            <p style="color: var(--text-muted);">Join the 2,000+ professionals we've helped place in North America.</p>
        </div>

        <form action="#">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label for="fullname">Full Legal Name</label>
                    <input type="text" id="fullname" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+1 (000) 000-0000">
                </div>
                <div class="form-group">
                    <label for="destination">Target Destination</label>
                    <select id="destination" required>
                        <option value="">Select Country</option>
                        <option value="ca">Canada</option>
                        <option value="us">United States</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sector">Primary Sector</label>
                    <select id="sector" required>
                        <option value="">Select Field</option>
                        <option value="logistics">Logistics / Driving</option>
                        <option value="care">Caregiving / Health</option>
                        <option value="tech">Technology</option>
                        <option value="trades">Skilled Trades</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create password">
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" required placeholder="Repeat password">
                </div>
            </div>
            
            <div style="margin: 24px 0 32px;">
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.875rem; color: var(--text-muted);">
                    <input type="checkbox" required style="width: auto; margin-top: 4px;">
                    <span>I agree to the <a href="terms.html" style="color: var(--primary); font-weight: 700;">Terms of Service</a> and <a href="privacy.html" style="color: var(--primary); font-weight: 700;">Privacy Policy</a>.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px; font-size: 1.1rem;">Create Professional Account</button>
        </form>

        <div style="text-align: center; margin-top: 32px; font-size: 0.95rem; color: var(--text-muted);">
            Already have an account? <a href="signin.html" style="color: var(--primary); font-weight: 700;">Sign in here</a>
        </div>
    </div>
</main>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }
</script>

</body>
</html>
