<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 64px 48px;
            border-radius: 32px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 40px;
            text-decoration: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-light);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }

        .auth-footer {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            font-size: 1rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .auth-card { padding: 48px 24px; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
            <b>Global Hub</b>
        </a>
        <h2 style="font-size: 2.25rem; margin-bottom: 12px;"><b>Start Your Journey</b></h2>
        <p style="color: var(--text-muted); margin-bottom: 40px; font-weight: 500;"><b>Join 2,000+ professionals securing their future in North America.</b></p>
        
        <form action="#">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" required placeholder="John">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" required placeholder="Doe">
                </div>
            </div>
            <div class="form-group">
                <label>Personal Email Address</label>
                <input type="email" required placeholder="john.doe@example.com">
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Target Country</label>
                    <select required>
                        <option value="">Select Destination</option>
                        <option value="ca">Canada</option>
                        <option value="us">USA</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Primary Field</label>
                    <select required>
                        <option value="">Select Industry</option>
                        <option value="logistics">Logistics / Driving</option>
                        <option value="healthcare">Healthcare / Caregiving</option>
                        <option value="tech">Technology / IT</option>
                        <option value="trades">Skilled Trades</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" required placeholder="Minimum 8 characters">
            </div>
            <div style="text-align: left; margin-bottom: 32px;">
                <label style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted);">
                    <input type="checkbox" required style="width: auto; margin-top: 4px;">
                    <span><b>I agree to the <a href="#" style="color: var(--primary); font-weight: 800;">Terms of Service</a> and <a href="#" style="color: var(--primary); font-weight: 800;">Privacy Policy</a>.</b></span>
                </label>
            </div>
            <button type="submit" class="auth-btn"><b>Create My Free Account</b></button>
        </form>

        <div class="auth-footer">
            <b>Already have an account? <a href="signin.html">Sign In</a></b>
        </div>
    </div>
</div>

</body>
</html>
