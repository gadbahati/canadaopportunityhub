<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            padding: 80px 0;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 640px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">Global Hub</a>
            <div class="nav-auth">
                <a href="signin.html" class="btn btn-outline">Sign In</a>
            </div>
        </nav>
    </div>
</header>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Start Your Journey</h1>
            <p>Join the 2,000+ professionals we've helped place in North America.</p>
        </div>

        <form action="#">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label for="fullname">Full Legal Name</label>
                    <input type="text" id="fullname" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+1 (000) 000-0000">
                </div>
                <div class="form-group">
                    <label for="destination">Target Destination</label>
                    <select id="destination" required>
                        <option value="">Select Country</option>
                        <option value="ca">Canada</option>
                        <option value="us">United States</option>
                        <option value="both">Both</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sector">Primary Sector</label>
                    <select id="sector" required>
                        <option value="">Select Field</option>
                        <option value="logistics">Logistics / Driving</option>
                        <option value="care">Caregiving / Health</option>
                        <option value="tech">Technology</option>
                        <option value="trades">Skilled Trades</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create password">
                </div>
                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" required placeholder="Repeat password">
                </div>
            </div>
            
            <div style="margin: 24px 0 32px;">
                <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.875rem; color: var(--text-muted);">
                    <input type="checkbox" required style="width: auto; margin-top: 4px;">
                    <span>I agree to the <a href="terms.html" style="color: var(--primary); font-weight: 700;">Terms of Service</a> and <a href="privacy.html" style="color: var(--primary); font-weight: 700;">Privacy Policy</a>.</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1rem;">Create Professional Account</button>
        </form>

        <div style="text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="signin.html" style="color: var(--primary); font-weight: 700;">Sign in here</a>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-bottom" style="border-top: none; padding-top: 0; justify-content: center;">
            <p>&copy; 2026 Global Opportunity Hub. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
</html>
