<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            padding: 100px 0;
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">Global Hub</a>
            <div class="nav-auth">
                <a href="signup.html" class="btn btn-primary">Get Started</a>
            </div>
        </nav>
    </div>
</header>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Access your professional dashboard.</p>
        </div>

        <form action="#">
            <div class="form-group">
                <label for="email">Work Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; font-size: 0.875rem;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted);">
                    <input type="checkbox" style="width: auto;"> Remember me
                </label>
                <a href="#" style="color: var(--primary); font-weight: 700;">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1rem;">Sign In to Portal</button>
        </form>

        <div style="text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 700;">Create one for free</a>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="footer-bottom" style="border-top: none; padding-top: 0; justify-content: center;">
            <p>&copy; 2026 Global Opportunity Hub. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
</html>
