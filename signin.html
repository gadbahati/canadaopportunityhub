<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(12px);
            padding: 64px 48px;
            border-radius: 32px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 40px;
            text-decoration: none;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: var(--secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--bg-light);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 12px;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }

        .auth-footer {
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            font-size: 1rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 800;
            text-decoration: none;
        }

        .alert {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 700;
            display: none;
        }
        .alert-error { background: #FEE2E2; color: #991B1B; border: 1px solid #F87171; }
        .alert-success { background: #DCFCE7; color: #166534; border: 1px solid #4ADE80; }

        @media (max-width: 480px) {
            .auth-card {
                padding: 48px 24px;
            }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <a href="index.html" class="auth-logo">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
            <b>Global Hub</b>
        </a>
        <h2 style="font-size: 2.25rem; margin-bottom: 12px;"><b>Welcome Back</b></h2>
        <p style="color: var(--text-muted); margin-bottom: 40px; font-weight: 500;"><b>Sign in to your secure career portal.</b></p>
        
        <div id="alert" class="alert"></div>

        <form id="signinForm">
            <div class="form-group">
                <label>Personal Email Address</label>
                <input type="email" id="email" required placeholder="Enter your email address">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <div style="text-align: right; margin-bottom: 32px;">
                <a href="#" style="font-size: 0.9rem; color: var(--primary); font-weight: 800;">Forgot Password?</a>
            </div>
            <button type="submit" class="auth-btn"><b>Sign In</b></button>
        </form>

        <div class="auth-footer">
            <b>New to Global Hub? <a href="signup.html">Create an Account</a></b>
        </div>
    </div>
</div>

<script>
    document.getElementById('signinForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const alertDiv = document.getElementById('alert');

        // Check if user exists in localStorage
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
            alertDiv.style.display = 'block';
            alertDiv.className = 'alert alert-success';
            alertDiv.innerHTML = '<b>Login successful! Redirecting to dashboard...</b>';
            
            // Set session
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            alertDiv.style.display = 'block';
            alertDiv.className = 'alert alert-error';
            alertDiv.innerHTML = '<b>Invalid email or password. Please try again.</b>';
        }
    });
</script>

</body>
</html>
