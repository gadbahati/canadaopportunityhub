<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Global Opportunity Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="container">
        <nav>
            <a href="index.html" class="logo">Global Hub</a>
            <div style="display: flex; align-items: center; gap: 24px;">
                <a href="signup.html" class="btn btn-primary">Get Started</a>
                <button onclick="toggleSidebar()" style="background: none; border: none; cursor: pointer; padding: 8px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
            </div>
        </nav>
    </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="logo" style="font-size: 1.25rem;">Main Menu</span>
        <button onclick="toggleSidebar()" style="background: none; border: none; cursor: pointer;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
    <ul class="sidebar-menu">
        <li><a href="index.html"><b>Home</b></a></li>
        <li><a href="about.html"><b>About Global Hub</b></a></li>
        <li><a href="jobs-ca.html"><b>Canada Careers</b></a></li>
        <li><a href="jobs-us.html"><b>USA Careers</b></a></li>
        <li><a href="faq.html"><b>FAQ Center</b></a></li>
        <li><a href="contact.html"><b>Contact Support</b></a></li>
    </ul>
</div>

<main class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header" style="text-align: center; margin-bottom: 40px;">
            <h1 style="color: var(--secondary);"><b>Welcome Back</b></h1>
            <p style="color: var(--text-muted);"><b>Access your personal career portal.</b></p>
        </div>

        <form action="#">
            <div class="form-group">
                <label for="email"><b>Email Address</b></label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password"><b>Password</b></label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; font-size: 0.875rem;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted);">
                    <input type="checkbox" style="width: auto;"> <b>Remember me</b>
                </label>
                <a href="#" style="color: var(--primary); font-weight: 700;"><b>Forgot Password?</b></a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px; font-size: 1.1rem;"><b>Sign In</b></button>
        </form>

        <div style="text-align: center; margin-top: 32px; font-size: 0.95rem; color: var(--text-muted);">
            <b>New to Global Hub?</b> <a href="signup.html" style="color: var(--primary); font-weight: 700;"><b>Create an account</b></a>
        </div>
    </div>
</main>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('sidebarOverlay').classList.toggle('active');
    }
</script>

<footer>
    <div class="container">
        <div class="footer-bottom" style="border-top: none; padding-top: 0; justify-content: center;">
            <p>&copy; 2026 Global Opportunity Hub. All rights reserved.</p>
        </div>
    </div>
</footer>

</body>
</html>
